<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistics - Book Tracker</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <h1>
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
            </svg>
            Book Tracker
        </h1>
        <ul>
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="books.html">My Books</a></li>
            <li><a href="add-book.html">Add Book</a></li>
            <li><a href="stats.html" class="active">Statistics</a></li>
            <li><a href="goals.html">Goals</a></li>
        </ul>
    </nav>

    <div class="container">
        <h2>
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="20" x2="18" y2="10"></line>
                <line x1="12" y1="20" x2="12" y2="4"></line>
                <line x1="6" y1="20" x2="6" y2="14"></line>
            </svg>
            Reading Statistics
        </h2>
        
        <div class="section">
            <h3>
                <svg class="icon-small" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
                This Month
            </h3>
            <div id="monthlyStats" class="stats-grid">
                <p>Loading monthly stats...</p>
            </div>
        </div>
        
        <div class="section">
            <h3>
                <svg class="icon-small" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 3v18h18"></path>
                    <path d="M18 17V9"></path>
                    <path d="M13 17V5"></path>
                    <path d="M8 17v-3"></path>
                </svg>
                All-Time Overview
            </h3>
            <div id="alltimeStats" class="stats-grid">
                <p>Loading all-time stats...</p>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Books - Book Tracker</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="brand">
            <div class="brand-mark">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                </svg>
            </div>
            <div class="brand-copy">
                <span class="brand-kicker">Personal Library</span>
                <h1>Book Tracker</h1>
            </div>
        </div>
        <div class="nav-actions">
            <ul>
                <li><a href="index.html">Dashboard</a></li>
                <li><a href="books.html" class="active">My Books</a></li>
                <li><a href="add-book.html">Add Book</a></li>
                <li><a href="stats.html">Statistics</a></li>
                <li><a href="goals.html">Goals</a></li>
            </ul>
            <button type="button" class="theme-toggle" id="themeToggle" aria-label="Toggle color theme">
                <span class="theme-toggle-track" aria-hidden="true"><span class="theme-toggle-thumb"></span></span>
                <span class="theme-toggle-label" data-theme-label>Light mode</span>
            </button>
        </div>
    </nav>

    <div class="container">
        <section class="page-intro">
            <div class="page-intro-copy">
                <span class="eyebrow">Library</span>
                <h2>My Books</h2>
                
            </div>
        </section>
        
        <div class="filter-buttons">
            <button class="btn btn-small btn-primary" id="btn-all" onclick="filterBooks('all', this)">All</button>
            <button class="btn btn-small btn-secondary" id="btn-reading" onclick="filterBooks('reading', this)">Reading</button>
            <button class="btn btn-small btn-secondary" id="btn-finished" onclick="filterBooks('finished', this)">Finished</button>
            <button class="btn btn-small btn-secondary" id="btn-want" onclick="filterBooks('want', this)">Want to Read</button>
        </div>

        <div class="sort-controls">
            <label for="sortBooks">Sort by</label>
            <select id="sortBooks" onchange="setBookSort(this.value)">
                <option value="default">Default order</option>
                <option value="rating-desc">Highest rated</option>
                <option value="rating-asc">Lowest rated</option>
            </select>
        </div>
        
        <div class="section">
            <div class="section-header">
                <div>
                    <h3>Your Collection</h3>
                    <p class="section-subtitle">Ratings and notes stay attached to finished books so the list doubles as a reading journal.</p>
                </div>
            </div>
            <div id="bookList" class="book-list">
                <p>Loading books...</p>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
